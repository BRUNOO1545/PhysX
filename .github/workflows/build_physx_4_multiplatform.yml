name: Build PhysX 4.1 (Multi-Platform)

on:
  workflow_dispatch: 

jobs:
  build-physx:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: MacOs
            preset: mac64
            compiler_dir: mac64
            bin_dir: mac.x86_64
            
          - os: Windows (Visual Studio 2019)
            preset: vc16win64
            compiler_dir: vc16win64
            bin_dir: win.x86_64.vc142.mt
            
          - os: Ubuntu 20.04
            preset: linux
            compiler_dir: linux
            bin_dir: linux.clang

    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout PhysX 4.1
      uses: actions/checkout@v4
      with:
        repository: BRUNOO1545/PhysX
        ref: 4.1
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # --- DEPENDENCIA LINUX ---
    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang libxxf86vm-dev libglu1-mesa-dev libx11-dev freeglut3-dev gcc-multilib g++-multilib

    # --- DEPENDENCIA WINDOWS ---
    - name: Setup MSBuild (Windows)
      if: runner.os == 'Windows'
      uses: microsoft/setup-msbuild@v2

    # --- GENERACIÓN DE PROYECTOS ---
    - name: Generate Projects (Mac / Linux)
      if: runner.os != 'Windows'
      run: |
        cd physx
        chmod +x generate_projects.sh
        ./generate_projects.sh ${{ matrix.preset }}

    - name: Generate Projects (Windows)
      if: runner.os == 'Windows'
      run: |
        cd physx
        .\generate_projects.bat ${{ matrix.preset }}

    # --- COMPILACIÓN macOS ---
    - name: Compile macOS
      if: runner.os == 'macOS'
      run: |
        cd physx/compiler/${{ matrix.compiler_dir }}
        
        echo "--- Compilando DEBUG ---"
        arch -x86_64 xcodebuild -project PhysXSDK.xcodeproj -configuration debug -target PhysXFoundation -target PhysXCommon -target PhysX -target PhysXCooking -target PhysXExtensions -target PhysXVehicle ARCHS=x86_64 ONLY_ACTIVE_ARCH=YES OTHER_CFLAGS="-Wno-error -Wno-missing-include-dirs" OTHER_CPLUSPLUSFLAGS="-Wno-error -Wno-missing-include-dirs"
        
        echo "--- Compilando RELEASE ---"
        arch -x86_64 xcodebuild -project PhysXSDK.xcodeproj -configuration release -target PhysXFoundation -target PhysXCommon -target PhysX -target PhysXCooking -target PhysXExtensions -target PhysXVehicle ARCHS=x86_64 ONLY_ACTIVE_ARCH=YES OTHER_CFLAGS="-Wno-error -Wno-missing-include-dirs" OTHER_CPLUSPLUSFLAGS="-Wno-error -Wno-missing-include-dirs"

    # --- COMPILACIÓN WINDOWS ---
    - name: Compile Windows
      if: runner.os == 'Windows'
      run: |
        cd physx/compiler/${{ matrix.compiler_dir }}
        
        echo "--- Compilando DEBUG ---"
        msbuild PhysXSDK.sln /p:Configuration=debug /p:Platform=x64 /t:PhysXFoundation;PhysXCommon;PhysX;PhysXCooking;PhysXExtensions;PhysXVehicle -m
        
        echo "--- Compilando RELEASE ---"
        msbuild PhysXSDK.sln /p:Configuration=release /p:Platform=x64 /t:PhysXFoundation;PhysXCommon;PhysX;PhysXCooking;PhysXExtensions;PhysXVehicle -m

    # --- COMPILACIÓN LINUX ---
    - name: Compile Linux
      if: runner.os == 'Linux'
      run: |
        echo "--- Compilando DEBUG ---"
        make -C physx/compiler/linux-debug -j4
        
        echo "--- Compilando RELEASE ---"
        make -C physx/compiler/linux-release -j4

    # --- EMPAQUETADO MAESTRO ---
    - name: Upload Binaries and Includes
      uses: actions/upload-artifact@v4
      with:
        name: PhysX-4.1-Binaries-MultiPlatform
        path: |
          physx/include/
          physx/bin/${{ matrix.bin_dir }}/
