name: Build PhysX 4.1 (macOS)

on:
  workflow_dispatch: 

jobs:
  build-physx-4:
    runs-on: macos-latest

    steps:
    - name: Checkout PhysX 4.1
      uses: actions/checkout@v4
      with:
        repository: NVIDIAGameWorks/PhysX
        ref: 4.1
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Generate Projects (Non-interactive)
      run: |
        cd physx
        chmod +x generate_projects.sh
        # El argumento mac64 le dice al script que no pregunte nada y genere directo
        ./generate_projects.sh mac64

    - name: Compile Library
      run: |
        # PhysX 4.1 genera los makefiles dentro de la carpeta compiler/mac64
        cd physx/compiler/mac64
        
        # Usamos 'make' con -j para compilar en paralelo usando todos los núcleos de la VM
        make -j$(sysctl -n hw.ncpu)

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: PhysX-4.1-macOS-Binaries
        # PhysX suele depositar los binarios finales (.a) en la carpeta bin/mac64/
        path: physx/bin/mac64/
