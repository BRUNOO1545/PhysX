name: Build PhysX 4.1 (macOS)

on:
  workflow_dispatch: 

jobs:
  build-physx-4:
    runs-on: macos-latest

    steps:
    - name: Checkout PhysX 4.1
      uses: actions/checkout@v4
      with:
        repository: NVIDIAGameWorks/PhysX
        ref: 4.1
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Generate Projects (Non-interactive)
      run: |
        cd physx
        chmod +x generate_projects.sh
        ./generate_projects.sh mac64
        
        # DEBUG: Vamos a listar lo que hay dentro de la carpeta 'compiler'
        # para encontrar dónde se escondió el Makefile.
        echo "--- CONTENIDO DE LA CARPETA COMPILER ---"
        ls -R compiler/

    - name: Compile Library
      run: |
        cd physx/compiler/mac64
        
        # Eliminamos cualquier artefacto previo para limpiar el error anterior
        xcodebuild -project PhysXSDK.xcodeproj -configuration Release clean
        
        # Compilamos SOLO las librerías necesarias para un motor de físicas
        arch -x86_64 xcodebuild -project PhysXSDK.xcodeproj \
                   -configuration Release \
                   -target PhysXFoundation \
                   -target PhysXCommon \
                   -target PhysX \
                   -target PhysXCooking \
                   -target PhysXExtensions \
                   -target PhysXVehicle \
                   ARCHS=x86_64 \
                   ONLY_ACTIVE_ARCH=YES \
                   OTHER_CFLAGS="-Wno-error -Wno-missing-include-dirs" \
                   OTHER_CPLUSPLUSFLAGS="-Wno-error -Wno-missing-include-dirs"

    - name: Debug - Listar binarios encontrados
      run: |
        echo "Buscando archivos .a en la carpeta physx..."
        find physx -name "*.a"

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: PhysX-4.1-macOS-Binaries
        # Cambiamos esto a un comodín para que capture todo lo que termine en .a
        # o simplemente le decimos que suba la carpeta bin/ completa
        path: physx/bin/
