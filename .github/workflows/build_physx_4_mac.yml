name: Build PhysX 4.1 (macOS)

on:
  workflow_dispatch: 

jobs:
  build-physx-4:
    runs-on: macos-latest

    steps:
    - name: Checkout PhysX 4.1
      uses: actions/checkout@v4
      with:
        repository: NVIDIAGameWorks/PhysX
        ref: 4.1
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Generate Projects (Non-interactive)
      run: |
        cd physx
        chmod +x generate_projects.sh
        ./generate_projects.sh mac64
        
        # DEBUG: Vamos a listar lo que hay dentro de la carpeta 'compiler'
        # para encontrar dónde se escondió el Makefile.
        echo "--- CONTENIDO DE LA CARPETA COMPILER ---"
        ls -R compiler/

    - name: Compile Library
      run: |
        cd physx/compiler/mac64
        
        # 1. LISTAMOS para estar 100% seguros de qué archivo de proyecto se creó
        ls -F
        
        # 2. COMPILAMOS usando xcodebuild
        # Asumiendo que el archivo principal se llama "PhysXSDK.xcodeproj"
        # xcodebuild necesita el nombre del proyecto y la configuración (Release)
        xcodebuild -project PhysXSDK.xcodeproj -configuration Release

    - name: Upload Binaries
      uses: actions/upload-artifact@v4
      with:
        name: PhysX-4.1-macOS-Binaries
        # PhysX suele depositar los binarios finales (.a) en la carpeta bin/mac64/
        path: physx/bin/mac64/
